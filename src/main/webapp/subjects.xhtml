<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
<h:head>
    <title>Subjects</title>
</h:head>
<h:body>
    <h1>Subjects</h1>
    
    <h:link outcome="subject-form" value="Add New Subject" />
    
    <h:dataTable value="#{subjectBean.subjects}" var="subject" border="1">
        <h:column>
            <f:facet name="header">ID</f:facet>
            #{subject.id}
        </h:column>
        
        <h:column>
            <f:facet name="header">Name</f:facet>
            #{subject.name}
        </h:column>
        
        <h:column>
            <f:facet name="header">Description</f:facet>
            #{subject.description}
        </h:column>
        
        <h:column>
            <f:facet name="header">Credits</f:facet>
            #{subject.credits}
        </h:column>
        
        <h:column>
            <f:facet name="header">Actions</f:facet>
            <h:form>
                <h:commandButton value="Edit" action="#{subjectBean.editSubject(subject.id)}" />
                <h:commandButton value="Delete" action="#{subjectBean.deleteSubject(subject.id)}" 
                                 onclick="return confirm('Are you sure you want to delete this subject?');" />
            </h:form>
        </h:column>
    </h:dataTable>
    
    <p>
        <h:link outcome="index" value="Back to Home" />
        |
        <h:link outcome="groups" value="View Groups" />
        |
        <h:link outcome="students" value="View Students" />
    </p>
</h:body>
</html>
