<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
<h:head>
    <title>Groups</title>
</h:head>
<h:body>
    <h1>Groups</h1>
    
    <h:link outcome="group-form" value="Add New Group" />
    
    <h:dataTable value="#{groupBean.groups}" var="group" border="1">
        <h:column>
            <f:facet name="header">ID</f:facet>
            #{group.id}
        </h:column>
        
        <h:column>
            <f:facet name="header">Name</f:facet>
            <h:link outcome="students" value="#{group.name}">
                <f:param name="groupId" value="#{group.id}" />
            </h:link>
        </h:column>
        
        <h:column>
            <f:facet name="header">Description</f:facet>
            #{group.description}
        </h:column>
        
        <h:column>
            <f:facet name="header">Number of Students</f:facet>
            #{group.students.size()}
        </h:column>
        
        <h:column>
            <f:facet name="header">Actions</f:facet>
            <h:form>
                <h:commandButton value="Edit" action="#{groupBean.editGroup(group.id)}" />
                <h:commandButton value="Delete" action="#{groupBean.deleteGroup(group.id)}" 
                                 onclick="return confirm('Are you sure you want to delete this group?');" />
            </h:form>
        </h:column>
    </h:dataTable>
    
    <p>
        <h:link outcome="index" value="← Back to Home" />
        |
        <h:link outcome="students" value="View Students" />
        |
        <h:link outcome="subjects" value="View Subjects" />
    </p>
</h:body>
</html>
