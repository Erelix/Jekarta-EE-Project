<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
<h:head>
    <title>Student Form</title>
</h:head>
<h:body>
    <f:metadata>
        <f:viewParam name="editId" value="#{studentBean.editId}" />
        <f:event type="preRenderView" listener="#{studentBean.loadStudent}" />
    </f:metadata>
    
    <h1><h:outputText value="Add New Student" rendered="#{studentBean.student.id == null}" /><h:outputText value="Edit Student" rendered="#{studentBean.student.id != null}" /></h1>
    
    <h:form>
        <h:inputHidden value="#{studentBean.student.id}" />
        <p>
            <label for="firstName">First Name *</label><br/>
            <h:inputText id="firstName" value="#{studentBean.student.firstName}" required="true" />
        </p>
        
        <p>
            <label for="lastName">Last Name *</label><br/>
            <h:inputText id="lastName" value="#{studentBean.student.lastName}" required="true" />
        </p>
        
        <p>
            <label for="email">Email</label><br/>
            <h:inputText id="email" value="#{studentBean.student.email}" />
        </p>
        
        <p>
            <label for="group">Group *</label><br/>
            <h:selectOneMenu id="group" value="#{studentBean.selectedGroupId}" required="true">
                <f:selectItem itemValue="" itemLabel="-- Select a Group --" />
                <f:selectItems value="#{studentBean.allGroups}" var="group" 
                               itemValue="#{group.id}" itemLabel="#{group.name}" />
            </h:selectOneMenu>
        </p>
        
        <p>
            <label for="subjects">Subjects (Hold Ctrl to select multiple)</label><br/>
            <h:selectManyListbox id="subjects" value="#{studentBean.selectedSubjectIds}" size="10">
                <f:selectItems value="#{studentBean.allSubjects}" var="subject" 
                               itemValue="#{subject.id}" itemLabel="#{subject.name}" />
            </h:selectManyListbox>
        </p>
        
        <p>
            <h:commandButton value="Save" action="#{studentBean.saveStudent()}" />
            <h:button value="Cancel" outcome="students" />
        </p>
    </h:form>
    
    <p>
        <h:link outcome="students" value="← Back to Students" />
    </p>
</h:body>
</html>
